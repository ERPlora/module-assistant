{% load i18n djicons %}

<div class="chat-message chat-system" id="confirmation-{{ log_id }}">
    <div class="callout callout-warning">
        <div class="callout-icon">{% icon "shield-checkmark-outline" %}</div>
        <div class="callout-content">
            <div class="callout-title">{% trans "Confirm action" %}</div>
            <div class="callout-text">{{ description }}</div>
        </div>
    </div>
    <div class="flex gap-2 mt-2" id="confirmation-buttons-{{ log_id }}">
        <button hx-post="{% url 'assistant:confirm_action' log_id %}"
                hx-target="#confirmation-{{ log_id }}"
                hx-swap="outerHTML"
                hx-disabled-elt="this"
                hx-on::before-request="this.closest('.flex').querySelectorAll('button').forEach(b => b.disabled = true); this.innerHTML = '<span class=\'loading loading-sm\'></span> {% trans "Executing..." %}';"
                class="btn btn-sm color-primary">
            {% icon "checkmark-outline" %}
            {% trans "Confirm" %}
        </button>
        <button hx-post="{% url 'assistant:cancel_action' log_id %}"
                hx-target="#confirmation-{{ log_id }}"
                hx-swap="outerHTML"
                hx-disabled-elt="this"
                class="btn btn-sm btn-outline">
            {% icon "close-outline" %}
            {% trans "Cancel" %}
        </button>
    </div>
</div>
