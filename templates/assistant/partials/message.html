{% load i18n %}

{% if role == 'assistant' %}
<div class="chat-message chat-assistant">
    <div class="chat-bubble">
        {{ content|linebreaksbr }}
    </div>
</div>
{% elif role == 'user' %}
<div class="chat-message chat-user">
    <div class="chat-bubble">
        {{ content|linebreaksbr }}
    </div>
</div>
{% elif role == 'system' %}
<div class="chat-message chat-system">
    <div class="callout {% if error %}callout-error{% elif success %}callout-success{% else %}callout-info{% endif %}">
        <div class="callout-content">
            <div class="callout-text">{{ content }}</div>
        </div>
    </div>
</div>
{% endif %}
