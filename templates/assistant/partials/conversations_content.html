{% load i18n djicons %}

<div class="flex flex-col h-full" style="min-height: calc(100vh - 180px);">
    <!-- Header with search -->
    <div class="px-4 pt-4 pb-2">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-semibold">{% trans "Conversations" %}</h2>
            <a hx-get="{% url 'assistant:chat' %}"
               hx-target="#main-content-area"
               hx-push-url="{% url 'assistant:chat' %}"
               class="btn color-primary btn-sm">
                {% icon "add-outline" size="sm" %}
                <span class="ml-1">{% trans "New Chat" %}</span>
            </a>
        </div>
        <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none">
                {% icon "search-outline" size="sm" %}
            </span>
            <input type="text"
                   id="conv-search"
                   class="input w-full pl-9"
                   placeholder="{% trans 'Search conversations...' %}"
                   autocomplete="off"
                   value="{{ search_query|default:'' }}">
        </div>
    </div>

    <!-- Conversation list (scrollable) -->
    <div id="conv-list" class="flex-1 overflow-y-auto px-2 pb-4">
        {% include "assistant/partials/conversation_items.html" %}
    </div>
</div>

<style>
    .conv-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
    }
    .conv-item:hover {
        background: var(--color-base-200);
    }
    .conv-item-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--color-primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.1rem;
    }
    .conv-item-body {
        flex: 1;
        min-width: 0;
    }
    .conv-item-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
    }
    .conv-item-title {
        font-weight: 500;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
    }
    .conv-item-time {
        font-size: 0.7rem;
        opacity: 0.45;
        white-space: nowrap;
    }
    .conv-item-preview {
        font-size: 0.8rem;
        opacity: 0.55;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
    }
    .conv-date-label {
        padding: 8px 12px 4px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        opacity: 0.4;
    }
    .conv-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem 1rem;
        opacity: 0.5;
        text-align: center;
    }
    .conv-empty-icon {
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
        opacity: 0.4;
    }
</style>

<script nonce="{{ csp_nonce }}">
(function() {
    var searchInput = document.getElementById('conv-search');
    var convList = document.getElementById('conv-list');
    var searchTimer = null;
    var LOAD_URL = "{% url 'assistant:history_load_more' %}";

    if (!searchInput || !convList) return;

    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer);
        var query = this.value.trim();
        searchTimer = setTimeout(function() {
            var url = LOAD_URL + '?offset=0';
            if (query) url += '&q=' + encodeURIComponent(query);
            fetch(url, { headers: { 'HX-Request': 'true' } })
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    convList.innerHTML = html;
                    if (window.htmx) htmx.process(convList);
                });
        }, 300);
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            this.value = '';
            this.dispatchEvent(new Event('input'));
            this.blur();
        }
    });
})();
</script>
