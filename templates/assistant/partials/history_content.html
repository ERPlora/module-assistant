{% load i18n djicons %}

<div class="p-4">
    <h2 class="text-xl font-semibold mb-4">{% trans "Conversation History" %}</h2>

    {% if conversations %}
    <div class="list list-inset">
        {% include "assistant/partials/history_items.html" %}
    </div>
    {% else %}
    <div class="callout callout-info">
        <div class="callout-content">
            <div class="callout-text">{% trans "No conversations yet. Start chatting in the Chat tab." %}</div>
        </div>
    </div>
    {% endif %}
</div>
